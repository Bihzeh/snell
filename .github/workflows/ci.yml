name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # :shared has no Minecraft dependency and is the fast, always-runnable gate.
      - name: Build & test shared
        run: ./gradlew :shared:build

      # Backend is plain Ktor/JVM.
      - name: Build backend
        run: ./gradlew :backend:build

      # Mod + launcher require the full toolchain (Loom decompile / Compose);
      # kept as a separate, non-blocking job target while the 26.1 build is wired.
      - name: Build mod & launcher
        run: ./gradlew :mod:build :launcher:build
        continue-on-error: true

      # Guard the shipping path: the launcher jar must embed the Snell mod, and the mod
      # jar must JiJ-nest :shared. Catches a broken bundle before it reaches a release.
      - name: Verify launcher bundles the Snell mod
        run: |
          ./gradlew :launcher:jar
          launcher_jar="$(ls launcher/build/libs/launcher-*.jar | head -1)"
          unzip -l "$launcher_jar" | grep -q 'bundled-mods/snell.jar' \
            || { echo "::error::$launcher_jar is missing bundled-mods/snell.jar"; exit 1; }
          mod_jar="$(ls mod/build/libs/mod-*.jar | head -1)"
          unzip -l "$mod_jar" | grep -Eq 'META-INF/jars/shared-.*\.jar' \
            || { echo "::error::$mod_jar is missing JiJ-nested shared"; exit 1; }
          echo "Bundle OK: launcher embeds snell.jar; mod nests shared"

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify LICENSES manifest exists
        run: test -f LICENSES/README.md && echo "LICENSES manifest present"

  ui-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenGL runtime (skiko needs libGL)
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglx-mesa0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4
      - name: Render launcher UI previews
        run: ./gradlew :launcher:uiPreview
      - name: Upload UI previews
        uses: actions/upload-artifact@v4
        with:
          name: snell-ui-previews
          path: launcher/build/ui-preview/*.png
          if-no-files-found: error
